name: mobile_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_localizations:
    sdk: flutter

  # Paquetes de Comunicación y Datos
  http: ^1.2.1
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  socket_io_client: ^3.1.2
  jwt_decoder: ^2.0.1

  # Paquetes Geoespaciales (ACTUALIZADOS)
  flutter_map: ^8.0.0 # <-- Actualización mayor
  latlong2: ^0.9.1
  geolocator: ^14.0.0 # <-- Actualización mayor
  permission_handler: ^12.0.1 # <-- Actualización mayor
  flutter_map_marker_cluster: ^8.0.0 # <-- Actualización mayor (debe coincidir con flutter_map)
  fl_heatmap: ^0.4.5
  # flutter_image_map: ^1.0.1
  # google_maps_places_autocomplete_widgets: ^1.3.3

  # Paquetes de UI y Utilidades
  image_picker: ^1.1.2
  intl: ^0.20.2 # <-- Actualización
  shimmer: ^3.0.0

  # Paquetes de Funcionalidades Nativas
  flutter_local_notifications: ^19.0.0 # <-- Actualización mayor
  flutter_background_service: ^5.0.1
  fl_chart: ^1.1.1
  pdf: ^3.11.3
  path_provider: ^2.1.5
  open_file: ^3.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/